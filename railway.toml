# Railway config-as-code for AiMedia API service.
# The Worker service is configured separately in the Railway dashboard
# using the same repo with dockerfilePath = backend/src/AiMedia.Worker/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/src/AiMedia.API/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
