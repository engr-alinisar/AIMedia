[build]
builder = "DOCKERFILE"

# ── API service ──────────────────────────────────────────────────────────────
[[services]]
name = "api"
source = "backend"
dockerfile = "src/AiMedia.API/Dockerfile"

[services.deploy]
healthcheckPath     = "/health"
healthcheckTimeout  = 30
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services.variables]]
name  = "ASPNETCORE_URLS"
value = "http://+:8080"

[[services.variables]]
name  = "ASPNETCORE_ENVIRONMENT"
value = "Production"

# ── Worker service ────────────────────────────────────────────────────────────
[[services]]
name = "worker"
source = "backend"
dockerfile = "src/AiMedia.Worker/Dockerfile"

[services.deploy]
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services.variables]]
name  = "DOTNET_ENVIRONMENT"
value = "Production"
