version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aimediadb
      POSTGRES_USER: aimedia
      POSTGRES_PASSWORD: aimedia_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimedia -d aimediadb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
