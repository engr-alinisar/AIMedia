# Railway config shared by API and Worker services.
# Dockerfile path is set per-service in Railway dashboard (Settings → Build → Dockerfile Path):
#   API service:    src/AiMedia.API/Dockerfile
#   Worker service: src/AiMedia.Worker/Dockerfile

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
