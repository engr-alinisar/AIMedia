# Railway monorepo config.
# Both services use Root Directory = "backend" in Railway dashboard.
# dockerfilePath is intentionally omitted so Railway uses the per-service
# Dockerfile path set in the dashboard (Settings → Build → Dockerfile Path):
#   API service:    src/AiMedia.API/Dockerfile
#   Worker service: src/AiMedia.Worker/Dockerfile

[build]
builder = "DOCKERFILE"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
