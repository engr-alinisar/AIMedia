# Railway config for AiMedia API service.
# In Railway dashboard: set Root Directory = "backend" for this service.

[build]
builder = "DOCKERFILE"
dockerfilePath = "src/AiMedia.API/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
